name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-gates:
    name: SDK PR quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run PR quality gates
        run: bash scripts/ci/pr_checks.sh
